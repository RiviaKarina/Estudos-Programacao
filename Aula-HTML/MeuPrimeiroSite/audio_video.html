<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio e Video</title>
</head>
<body>
    <h1>Áudio e Vídeo</h1> <a href="index.html">Voltar para página inicial</a><hr>

    <h3>Audio de Link</h3>

    <audio controls controlslist="nodownload">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio><!--Tag audio Ultilizada para exibir áudios -->

    <h3>Áudio Local</h3>
    <audio controls controlslist="nodownload">
        <source src="audio/kurapika.mp3" type="audio/mpeg">
    </audio><!--Tag audio Ultilizada para exibir áudios -->

    <p> Kurapika está se afogando em um vazio indescritível!</p>

    <h3>Vídeo de Link</h3><!--Geralmente ultiliza-se o Iframe ao invés da tag video para videos por links-->
    <video poster="img/cesta de cachorro.jpg" controls controlslist="nodownload" width="400">
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video><!--Tag video Ultilizada para exibir vídeos --> 
   
    <h3>Vídeo Local</h3> 
    <video controls controlslist="nodownload" width="400">
        <source src="video/Video teste.webm" type="video/webm">
    </video><!--Tag video Ultilizada para exibir vídeos -->
    <!--tag autoplay para reprodução automática-->
    <!--tag loop para reprodução em loop-->
    <!--tag muted para deixar o vídeo sem som-->
    <!--tag poster para exibir uma imagem antes do vídeo ser reproduzido-->
    <!--tag controlslist="nodownload" "nofullscreen"--

</body>
</html>
